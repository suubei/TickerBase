<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Dialog – JSON + Markdown</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }

  .dialog { background: #fff; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,.18); display: flex; flex-direction: column; width: 780px; max-height: 80vh; overflow: hidden; }

  .dialog-header { padding: 16px 20px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .dialog-header h2 { font-size: 14px; font-weight: 600; color: #111827; }
  .btn-close { background: none; border: none; cursor: pointer; font-size: 18px; color: #9ca3af; line-height: 1; }
  .btn-close:hover { color: #4b5563; }

  .panes { display: flex; flex: 1; overflow: hidden; min-height: 320px; border-bottom: 1px solid #e5e7eb; }

  .pane { display: flex; flex-direction: column; width: 50%; overflow: hidden; }
  .pane + .pane { border-left: 1px solid #e5e7eb; }

  .pane-header { padding: 8px 16px; background: #f9fafb; border-bottom: 1px solid #f3f4f6; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .pane-label { font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: .06em; }
  .pane-desc { font-size: 11px; color: #9ca3af; }

  textarea { flex: 1; padding: 16px; font-family: 'Menlo', 'Monaco', 'Courier New', monospace; font-size: 12px; color: #1f2937; border: none; resize: none; outline: none; background: #fff; }

  .error { padding: 8px 16px; background: #fef2f2; border-top: 1px solid #fecaca; font-size: 12px; color: #dc2626; display: none; flex-shrink: 0; }
  .hint { padding: 8px 16px; background: #f9fafb; border-top: 1px solid #f3f4f6; font-size: 12px; color: #9ca3af; flex-shrink: 0; }
  .hint code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-family: monospace; }

  /* Markdown preview */
  #mdPreview { flex: 1; padding: 16px; overflow-y: auto; display: none; font-size: 13px; color: #374151; line-height: 1.7; }
  #mdPreview h1 { font-size: 20px; font-weight: 700; color: #111827; margin-bottom: 12px; }
  #mdPreview h2 { font-size: 15px; font-weight: 600; color: #111827; margin-top: 18px; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid #f3f4f6; }
  #mdPreview h3 { font-size: 13px; font-weight: 600; color: #111827; margin-top: 12px; margin-bottom: 4px; }
  #mdPreview ul { padding-left: 20px; }
  #mdPreview li { margin-bottom: 4px; }
  #mdPreview p { margin-bottom: 6px; }

  /* Preview toggle button */
  .btn-toggle { font-size: 11px; padding: 2px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #e5e7eb; background: #fff; color: #9ca3af; transition: all .15s; }
  .btn-toggle.active { background: #eff6ff; border-color: #bfdbfe; color: #1d4ed8; }
  .btn-toggle:hover { background: #f3f4f6; }

  /* Footer */
  .dialog-footer { padding: 12px 20px; background: #f9fafb; display: flex; justify-content: flex-end; gap: 8px; border-radius: 0 0 12px 12px; flex-shrink: 0; }
  .btn { padding: 6px 16px; font-size: 13px; border-radius: 6px; cursor: pointer; transition: background .15s; border: none; }
  .btn-secondary { background: #fff; border: 1px solid #d1d5db; color: #374151; }
  .btn-secondary:hover { background: #f3f4f6; }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #111827; color: #fff; font-size: 13px; padding: 8px 16px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.2); display: none; z-index: 100; }
</style>
</head>
<body>
<div class="backdrop">
  <div class="dialog">
    <div class="dialog-header">
      <h2>Create Record</h2>
      <button class="btn-close" onclick="reset()">✕</button>
    </div>

    <div class="panes">
      <!-- JSON pane -->
      <div class="pane">
        <div class="pane-header">
          <span class="pane-label">JSON</span>
          <span class="pane-desc">Defines record fields</span>
        </div>
        <textarea id="jsonInput" spellcheck="false" oninput="clearError()"></textarea>
        <div class="error" id="error"></div>
        <div class="hint">Required: <code>name</code> <code>ticker</code></div>
      </div>

      <!-- Markdown pane -->
      <div class="pane">
        <div class="pane-header">
          <span class="pane-label">Markdown</span>
          <button class="btn-toggle" id="previewBtn" onclick="togglePreview()">👁 Preview</button>
        </div>
        <textarea id="mdInput" spellcheck="false" placeholder="Write Markdown content..."></textarea>
        <div id="mdPreview"></div>
      </div>
    </div>

    <div class="dialog-footer">
      <button class="btn btn-secondary" onclick="reset()">Cancel</button>
      <button class="btn btn-primary" onclick="handleCreate()">Create</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  let previewing = false;

  function defaultJson() {
    return JSON.stringify({ name: "", ticker: "", theme: "Technology", category: "Equity", watchlist: "My Watchlist" }, null, 2);
  }

  document.getElementById('jsonInput').value = defaultJson();
  document.getElementById('mdInput').value = "# New Record\n\nWrite your content here...\n\n## Details\n\n- Point one\n- Point two";

  function togglePreview() {
    previewing = !previewing;
    const btn = document.getElementById('previewBtn');
    const editor = document.getElementById('mdInput');
    const preview = document.getElementById('mdPreview');
    if (previewing) {
      preview.innerHTML = renderMd(editor.value);
      editor.style.display = 'none';
      preview.style.display = 'block';
      btn.textContent = '✎ Edit';
      btn.classList.add('active');
    } else {
      editor.style.display = '';
      preview.style.display = 'none';
      btn.textContent = '👁 Preview';
      btn.classList.remove('active');
    }
  }

  function renderMd(text) {
    return text.split('\n').map(line => {
      if (/^### (.+)/.test(line)) return `<h3>${line.replace(/^### /,'')}</h3>`;
      if (/^## (.+)/.test(line))  return `<h2>${line.replace(/^## /,'')}</h2>`;
      if (/^# (.+)/.test(line))   return `<h1>${line.replace(/^# /,'')}</h1>`;
      if (/^- \*\*(.+?)\*\*(.*)/.test(line)) {
        const m = line.match(/^- \*\*(.+?)\*\*(.*)/);
        return `<ul><li><strong>${m[1]}</strong>${m[2]}</li></ul>`;
      }
      if (/^- (.+)/.test(line))   return `<ul><li>${line.replace(/^- /,'')}</li></ul>`;
      if (line.trim() === '')     return `<div style="height:8px"></div>`;
      return `<p>${line}</p>`;
    }).join('');
  }

  function handleCreate() {
    const val = document.getElementById('jsonInput').value;
    try {
      const p = JSON.parse(val);
      if (!p.name || !p.ticker) { showError("'name' and 'ticker' fields are required."); return; }
      clearError();
      showToast('Record "' + p.name + '" created!');
      reset();
    } catch(e) {
      showError("Invalid JSON: " + e.message);
    }
  }

  function reset() {
    document.getElementById('jsonInput').value = defaultJson();
    document.getElementById('mdInput').value = "# New Record\n\nWrite your content here...\n\n## Details\n\n- Point one\n- Point two";
    clearError();
    if (previewing) togglePreview();
  }

  function showError(msg) { const e = document.getElementById('error'); e.textContent = msg; e.style.display = 'block'; }
  function clearError() { document.getElementById('error').style.display = 'none'; }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 2500);
  }
</script>
</body>
</html>
