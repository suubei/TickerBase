<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Dialog - JSON Only</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  textarea { outline: none; }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <!-- Backdrop -->
  <div class="fixed inset-0 bg-black bg-opacity-30 flex items-center justify-center z-40">
    <div class="bg-white rounded-xl shadow-xl flex flex-col w-full max-w-xl mx-4" style="max-height:85vh;">

      <!-- Header -->
      <div class="px-5 py-4 border-b border-gray-200 flex items-center justify-between">
        <h2 class="text-sm font-semibold text-gray-900">Create Record</h2>
        <button onclick="document.getElementById('error').classList.add('hidden'); document.getElementById('jsonInput').value = defaultJson();"
          class="text-gray-400 hover:text-gray-600 text-lg leading-none">✕</button>
      </div>

      <!-- Body -->
      <div class="flex flex-col flex-1 overflow-hidden min-h-0">
        <!-- Pane header -->
        <div class="px-4 py-2 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
          <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">JSON</span>
          <span class="text-xs text-gray-400">Defines record fields</span>
        </div>
        <!-- Textarea -->
        <textarea id="jsonInput"
          class="flex-1 p-4 text-sm font-mono text-gray-800 resize-none bg-white min-h-64"
          spellcheck="false"></textarea>
        <!-- Error -->
        <div id="error" class="hidden px-4 py-2 bg-red-50 border-t border-red-200 text-xs text-red-600"></div>
        <!-- Hint -->
        <div class="px-4 py-2 border-t border-gray-100 bg-gray-50 text-xs text-gray-400">
          Required: <code class="bg-gray-100 px-1 rounded">name</code>
          <code class="bg-gray-100 px-1 rounded">ticker</code>
        </div>
      </div>

      <!-- Footer -->
      <div class="px-5 py-3 border-t border-gray-200 flex justify-end gap-2 bg-gray-50 rounded-b-xl">
        <button onclick="reset()"
          class="px-4 py-1.5 text-sm border border-gray-300 rounded-md hover:bg-gray-100">Cancel</button>
        <button onclick="handleCreate()"
          class="px-4 py-1.5 text-sm bg-blue-600 text-white rounded-md hover:bg-blue-700">Create</button>
      </div>

    </div>
  </div>

  <!-- Success Toast -->
  <div id="toast" class="hidden fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-sm px-4 py-2 rounded-lg shadow-lg z-50">
    Record created!
  </div>

<script>
  function defaultJson() {
    return JSON.stringify({ name: "", ticker: "", theme: "Technology", category: "Equity", watchlist: "My Watchlist" }, null, 2);
  }

  document.getElementById('jsonInput').value = defaultJson();

  function handleCreate() {
    const val = document.getElementById('jsonInput').value;
    const err = document.getElementById('error');
    try {
      const parsed = JSON.parse(val);
      if (!parsed.name || !parsed.ticker) {
        err.textContent = "'name' and 'ticker' fields are required.";
        err.classList.remove('hidden');
        return;
      }
      err.classList.add('hidden');
      showToast('Record "' + parsed.name + '" created!');
      reset();
    } catch(e) {
      err.textContent = "Invalid JSON: " + e.message;
      err.classList.remove('hidden');
    }
  }

  function reset() {
    document.getElementById('jsonInput').value = defaultJson();
    document.getElementById('error').classList.add('hidden');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 2500);
  }
</script>
</body>
</html>
